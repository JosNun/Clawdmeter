[env:esp32_ssd1306]
; Plain ESP32-WROOM-32 dev board + SSD1306 128x32 monochrome OLED over I2C.
; Display-only port (no touch / PMU / IMU / buttons). Dual-core Xtensa, BLE
; 4.2 (NimBLE peripheral works), no PSRAM, UART-bridge USB (CP2102/CH340).
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32dev
framework = arduino
upload_speed = 460800
monitor_speed = 115200
; This firmware (~1.4 MB) doesn't fit the default 4 MB layout's 1.25 MB app
; slot — huge_app gives the app ~3 MB (no OTA, fine for this).
board_build.partitions = huge_app.csv

build_src_filter =
    +<*>
    -<boards/>
    +<boards/esp32_ssd1306/>

build_flags =
    -DBOARD_ESP32_SSD1306
    ; WROOM-32 has no native USB — Serial is UART0 via the onboard bridge, so
    ; do NOT set ARDUINO_USB_CDC_ON_BOOT (that's S3/C6 only).
    ; No -DBOARD_HAS_PSRAM — WROOM-32 has no external PSRAM. Shared code picks
    ; MALLOC_CAP_INTERNAL, shrinks the LVGL buffer, and disables screenshot.
    ; NimBLE peripheral (data service; HID service is built but unused here).
    -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER=1
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=1
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=0
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER=0
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=2
    -DLV_CONF_SKIP
    -DLV_COLOR_DEPTH=16
    ; Refresh every 20ms (~50fps) instead of LVGL's 33ms default — the faster
    ; single-flush path (full-height buffer + chunked I2C @ 800kHz) keeps up,
    ; so animations (scene carousel, tide ripple) read as fluid.
    -DLV_DEF_REFR_PERIOD=20
    -DLV_USE_LOG=0
    -DLV_USE_BAR=1
    -DLV_USE_LABEL=1
    -DLV_USE_ARC=1
    -DLV_USE_BTN=1
    -DLV_USE_LINE=1
    -DLV_USE_OBJ=1
    -DLV_USE_IMG=1
    -DLV_USE_IMAGE=1
    -DLV_USE_ANIMIMG=0
    -DLV_TICK_CUSTOM=1
    ; A 128x32 RGB565 snapshot is only ~8 KB, so it fits internal SRAM even
    ; without PSRAM — enable it so `screenshot` works for UI QA. (send_screenshot
    ; falls back to an internal-SRAM buffer for small frames.)
    -DLV_USE_SNAPSHOT=1

lib_deps =
    ; Display is a vendored SSD1306 I2C driver (boards/esp32_ssd1306/ssd1306.*),
    ; and there's no touch/PMU/IMU here — so GFX/SensorLib/XPowersLib are all
    ; omitted. Only LVGL, JSON, and NimBLE are needed.
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.0.0
    h2zero/NimBLE-Arduino@^2.1.1
